<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
}

</style>

</head>

<body>

<h2>تسجيل لاعب</h2>

<input id="name" placeholder="الاسم">

<input id="age" placeholder="العمر">

<input id="phone" placeholder="رقم الهاتف">

<input id="parent_phone" placeholder="رقم ولي الأمر">

<button onclick="register()">

تسجيل

</button>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

async function register(){

const user = tg.initDataUnsafe.user;

const name = document.getElementById("name").value.trim();
const age = document.getElementById("age").value.trim();
const phone = document.getElementById("phone").value.trim();
const parent_phone = document.getElementById("parent_phone").value.trim();

if(name.length < 3){
alert("الاسم غير صحيح");
return;
}

if(isNaN(age)){
alert("العمر غير صحيح");
return;
}

if(phone.length < 8){
alert("رقم الهاتف غير صحيح");
return;
}

if(parent_phone.length < 8){
alert("رقم ولي الأمر غير صحيح");
return;
}

const response = await fetch(
"https://script.google.com/macros/s/AKfycby2H9Covg983BFs2p_4G7mu4Qed6V3r3iVXXK5LCtnGr8Dm-uV2nTcU1cWb74lh64mwag/exec",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:user.id,
name,
age,
phone,
parent_phone
})
}
);

const result = await response.json();

if(result.success){

alert("تم التسجيل بنجاح");

tg.close();

}else{

alert("أنت مسجل بالفعل");

}

}

</script>

</body>
</html>
